<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 Игровой список</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f4f6fa;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .app {
      max-width: 800px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #0b1b2f;
      margin-bottom: 1.5rem;
    }

    h1 i {
      color: #4f7df3;
      font-size: 1.7rem;
    }

    /* ——— Кнопки управления ——— */
    .backup-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
      padding: 0.8rem 1rem;
      background: #f8faff;
      border-radius: 16px;
      border: 1px solid #edf2f9;
      align-items: center;
      justify-content: space-between;
    }

    .backup-btn {
      background: white;
      border: 1px solid #dbe1ec;
      color: #2b405c;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .backup-btn i {
      font-size: 0.9rem;
      color: #4f7df3;
    }

    .backup-btn:hover {
      background: #4f7df3;
      border-color: #4f7df3;
      color: white;
    }

    .backup-btn:hover i {
      color: white;
    }

    .backup-btn.danger:hover {
      background: #e35f5f;
      border-color: #e35f5f;
    }

    .backup-btn.primary {
      background: #4f7df3;
      border-color: #4f7df3;
      color: white;
    }

    .backup-btn.primary i {
      color: white;
    }

    .backup-btn.primary:hover {
      background: #3b66db;
      transform: scale(0.98);
    }

    .backup-btn input[type="file"] {
      display: none;
    }

    .backup-btn .btn-label {
      display: inline;
    }

    /* ——— Фильтры по платформам ——— */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: #f8faff;
      border-radius: 16px;
      border: 1px solid #edf2f9;
      margin-bottom: 1.2rem;
      align-items: center;
    }

    .filter-bar .filter-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #4b5b73;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-right: 0.2rem;
    }

    .filter-bar .filter-label i {
      color: #4f7df3;
    }

    .filter-btn {
      background: white;
      border: 1px solid #dbe1ec;
      color: #2b405c;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .filter-btn:hover {
      background: #eef4ff;
      border-color: #4f7df3;
    }

    .filter-btn.active {
      background: #4f7df3;
      border-color: #4f7df3;
      color: white;
    }

    .filter-btn.active i {
      color: white;
    }

    .filter-btn i {
      font-size: 0.8rem;
      color: #4f7df3;
    }

    .filter-btn .filter-count {
      background: #edf2fa;
      color: #4b5b73;
      font-size: 0.6rem;
      padding: 0.1rem 0.4rem;
      border-radius: 20px;
      margin-left: 2px;
    }

    .filter-btn.active .filter-count {
      background: rgba(255,255,255,0.25);
      color: white;
    }

    .filter-btn.clear-filter {
      color: #e35f5f;
    }

    .filter-btn.clear-filter i {
      color: #e35f5f;
    }

    .filter-btn.clear-filter:hover {
      background: #fee8e8;
      border-color: #e35f5f;
    }

    /* ——— Форма добавления (скрываемая) ——— */
    .add-form-wrapper {
      margin-bottom: 1.5rem;
    }

    .add-form {
      background: #f8faff;
      padding: 1.5rem 1.5rem 1.8rem;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border: 1px solid #edf2f9;
      margin-top: 1rem;
    }

    .add-form.hidden {
      display: none;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .form-row .field {
      flex: 1 1 160px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-row .field.year-field {
      flex: 0 1 140px;
    }

    .field label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #4b5b73;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .field label i {
      font-size: 0.8rem;
      width: 16px;
      color: #4f7df3;
    }

    .field label .optional {
      font-weight: 400;
      text-transform: none;
      font-size: 0.65rem;
      color: #a5b6cd;
    }

    .field input,
    .field select,
    .field textarea {
      background: white;
      border: 1px solid #dbe1ec;
      border-radius: 16px;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
      width: 100%;
      color: #0b1b2f;
      font-family: inherit;
    }

    .field textarea {
      resize: vertical;
      min-height: 60px;
      max-height: 150px;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #4f7df3;
      box-shadow: 0 0 0 4px rgba(79, 125, 243, 0.12);
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #a5b6cd;
      font-weight: 400;
    }

    /* ——— Зона загрузки картинки ——— */
    .drop-zone {
      background: white;
      border: 2px dashed #dbe1ec;
      border-radius: 16px;
      padding: 0.65rem 1rem;
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.2s;
      cursor: pointer;
      position: relative;
    }

    .drop-zone:hover {
      border-color: #4f7df3;
      background: #fafcff;
    }

    .drop-zone.dragover {
      border-color: #4f7df3;
      background: #eef4ff;
      border-style: solid;
    }

    .drop-zone .preview-img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: #eef3fc;
    }

    .drop-zone .placeholder {
      color: #a5b6cd;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .drop-zone .placeholder i {
      font-size: 1.2rem;
      color: #bcc9df;
    }

    .drop-zone .remove-image {
      background: none;
      border: none;
      color: #bcc9df;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 20px;
      transition: 0.15s;
    }

    .drop-zone .remove-image:hover {
      color: #e35f5f;
      background: rgba(227, 95, 95, 0.08);
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .add-btn {
      background: #4f7df3;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 4px 12px rgba(79, 125, 243, 0.25);
      margin-top: 6px;
      align-self: flex-start;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .add-btn:hover {
      background: #3b66db;
      transform: scale(0.98);
      box-shadow: 0 6px 16px rgba(79, 125, 243, 0.3);
    }

    .add-btn i {
      font-size: 0.9rem;
    }

    .add-btn.cancel-btn {
      background: #e8ecf1;
      color: #4b5b73;
      box-shadow: none;
    }

    .add-btn.cancel-btn:hover {
      background: #d5dae3;
      transform: scale(0.98);
    }

    /* ——— Сортировка над списком ——— */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.6rem 1rem;
      background: #f8faff;
      border-radius: 16px;
      border: 1px solid #edf2f9;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .sort-bar .sort-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #4b5b73;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sort-bar .sort-label i {
      color: #4f7df3;
    }

    .sort-bar select {
      background: white;
      border: 1px solid #dbe1ec;
      border-radius: 20px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
      color: #0b1b2f;
      flex: 1;
      max-width: 290px;
    }

    .sort-bar select:focus {
      border-color: #4f7df3;
      box-shadow: 0 0 0 3px rgba(79, 125, 243, 0.12);
    }

    .sort-bar .games-count {
      font-size: 0.75rem;
      color: #a5b6cd;
      margin-left: auto;
    }

    /* ——— Список игр ——— */
    .game-list {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .game-item {
      background: white;
      border-radius: 20px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      border: 1px solid #eef3fc;
      transition: 0.15s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
    }

    .game-item:hover {
      border-color: #d2def5;
      background: #fafcff;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.02);
    }

    .game-cover {
      width: 220px;
      height: 120px;
      border-radius: 16px;
      background: #eef3fc;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #9eb1cc;
      border: 1px solid #e0e9f5;
    }

    .game-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .game-info {
      flex: 1;
      min-width: 0;
    }

    .game-title {
      font-weight: 600;
      font-size: 1.1rem;
      color: #0a1a2b;
      letter-spacing: -0.2px;
      margin-bottom: 2px;
    }

    .game-description {
      font-size: 0.85rem;
      color: #5a6f8a;
      margin: 4px 0 12px 0;
      line-height: 1.5;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    .game-time {
      font-size: 0.8rem;
      color: #7a8fa8;
      margin: 2px 0 4px 0;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .game-time i {
      font-size: 0.7rem;
      color: #a5b6cd;
    }

    .game-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem 1rem;
      margin-top: 4px;
      font-size: 0.85rem;
    }

    .game-rating {
      display: flex;
      align-items: center;
      gap: 2px;
      font-weight: 500;
    }

    .game-platform {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #edf2fa;
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #2b405c;
      letter-spacing: 0.2px;
    }

    .game-platform i {
      font-size: 0.8rem;
      color: #4f7df3;
    }

    .game-year {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: #7a8fa8;
      background: #f0f4fa;
      padding: 0.15rem 0.6rem;
      border-radius: 30px;
    }

    .game-year i {
      font-size: 0.7rem;
      color: #a5b6cd;
    }

    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-self: flex-start;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .edit-btn,
    .delete-btn {
      background: none;
      border: none;
      color: #bcc9df;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      transition: 0.1s;
      border-radius: 30px;
      text-align: center;
      width: 32px;
    }

    .edit-btn:hover {
      color: #4f7df3;
      background: rgba(79, 125, 243, 0.08);
    }

    .delete-btn:hover {
      color: #e35f5f;
      background: rgba(227, 95, 95, 0.05);
    }

    .empty-state {
      text-align: center;
      padding: 2.5rem 0 1.2rem;
      color: #8fa2be;
      font-weight: 400;
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .empty-state i {
      font-size: 2.6rem;
      color: #d2def0;
      margin-bottom: 6px;
    }

    /* ——— Модальное окно ——— */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 32px;
      padding: 2rem;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
    }

    .modal h2 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #0b1b2f;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal h2 i {
      color: #4f7df3;
    }

    .modal .field {
      margin-bottom: 1rem;
    }

    .modal .field label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: #4b5b73;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }

    .modal .field label i {
      color: #4f7df3;
    }

    .modal .field label .optional {
      font-weight: 400;
      text-transform: none;
      font-size: 0.65rem;
      color: #a5b6cd;
    }

    .modal .field input,
    .modal .field select,
    .modal .field textarea {
      background: white;
      border: 1px solid #dbe1ec;
      border-radius: 16px;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
      width: 100%;
      color: #0b1b2f;
      font-family: inherit;
    }

    .modal .field textarea {
      resize: vertical;
      min-height: 60px;
      max-height: 200px;
    }

    .modal .field input:focus,
    .modal .field select:focus,
    .modal .field textarea:focus {
      border-color: #4f7df3;
      box-shadow: 0 0 0 4px rgba(79, 125, 243, 0.12);
    }

    .modal .modal-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }

    .modal .modal-actions .save-btn {
      background: #4f7df3;
      color: white;
      box-shadow: 0 4px 12px rgba(79, 125, 243, 0.25);
    }

    .modal .modal-actions .save-btn:hover {
      background: #3b66db;
      transform: scale(0.98);
    }

    .modal .modal-actions .cancel-btn {
      background: #f0f2f5;
      color: #4b5b73;
    }

    .modal .modal-actions .cancel-btn:hover {
      background: #e5e8ec;
    }

    .modal .drop-zone-modal {
      background: white;
      border: 2px dashed #dbe1ec;
      border-radius: 16px;
      padding: 0.65rem 1rem;
      min-height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.2s;
      cursor: pointer;
      position: relative;
    }

    .modal .drop-zone-modal:hover {
      border-color: #4f7df3;
      background: #fafcff;
    }

    .modal .drop-zone-modal.dragover {
      border-color: #4f7df3;
      background: #eef4ff;
      border-style: solid;
    }

    .modal .drop-zone-modal .preview-img-modal {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: #eef3fc;
    }

    .modal .drop-zone-modal .placeholder-modal {
      color: #a5b6cd;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .modal .drop-zone-modal .placeholder-modal i {
      font-size: 1.2rem;
      color: #bcc9df;
    }

    .modal .drop-zone-modal .remove-image-modal {
      background: none;
      border: none;
      color: #bcc9df;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 20px;
      transition: 0.15s;
    }

    .modal .drop-zone-modal .remove-image-modal:hover {
      color: #e35f5f;
      background: rgba(227, 95, 95, 0.08);
    }

    .modal .drop-zone-modal input[type="file"] {
      display: none;
    }

    /* ——— Стили для печати ——— */
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }

      .app {
        box-shadow: none;
        padding: 20px;
        max-width: 100%;
        border-radius: 0;
      }

      .backup-controls,
      .add-form-wrapper,
      .action-btns,
      .empty-state,
      #emptyState {
        display: none !important;
      }

      .filter-bar,
      .sort-bar {
        display: flex !important;
      }

      .game-item {
        break-inside: avoid;
        page-break-inside: avoid;
        border: 1px solid #eef3fc !important;
        box-shadow: none !important;
      }

      .game-cover {
        width: 150px !important;
        height: 100px !important;
      }

      .game-item:hover {
        background: white !important;
        border-color: #eef3fc !important;
      }
    }

    @media (max-width: 650px) {
      .game-cover {
        width: 120px;
        height: 80px;
      }
    }

    @media (max-width: 550px) {
      .app {
        padding: 1.5rem 1.2rem;
      }
      .form-row .field {
        flex: 1 1 100%;
      }
      .form-row .field.year-field {
        flex: 1 1 100%;
      }
      .add-btn {
        width: 100%;
        justify-content: center;
      }
      .game-item {
        flex-wrap: wrap;
        padding: 0.9rem;
      }
      .game-cover {
        width: 100%;
        height: 160px;
      }
      .game-title {
        font-size: 1rem;
      }
      .drop-zone {
        min-height: 44px;
        padding: 0.5rem 0.8rem;
      }
      .backup-controls {
        flex-direction: column;
        align-items: stretch;
      }
      .backup-controls > div {
        justify-content: center;
        flex-wrap: wrap;
      }
      .filter-bar {
        justify-content: center;
      }
      .sort-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .sort-bar select {
        max-width: 100%;
      }
      .sort-bar .games-count {
        margin-left: 0;
        text-align: center;
      }
      .modal {
        padding: 1.5rem;
      }
      .action-btns {
        flex-direction: row;
        align-self: center;
        margin-top: 0;
      }
      .backup-btn .btn-label {
        display: none;
      }
    }
  </style>
</head>
<body>

<div class="app">
  <h1><i class="fas fa-gamepad"></i> Мои пройденные игры</h1>

  <!-- Кнопки управления -->
  <div class="backup-controls">
    <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
      <button class="backup-btn primary" id="toggleFormBtn">
        <i class="fas fa-plus-circle"></i> <span class="btn-label">Добавить игру</span>
      </button>
    </div>

    <div style="display:flex; gap:0.6rem; flex-wrap:wrap; align-items:center;">

<script>
  (function() {
    let games = [];
    let currentImageData = null;
    let editingGameId = null;
    let modalImageData = null;

    const STORAGE_KEY = 'gamesList';

    // --- DOM элементы ---
    const container = document.getElementById('gameListContainer');
    const emptyState = document.getElementById('emptyState');
    const addBtn = document.getElementById('addGameBtn');
    const toggleFormBtn = document.getElementById('toggleFormBtn');
    const cancelFormBtn = document.getElementById('cancelFormBtn');
    const addForm = document.getElementById('addForm');
    const nameInput = document.getElementById('gameName');
    const descriptionInput = document.getElementById('gameDescription');
    const ratingSelect = document.getElementById('gameRating');
    const platformSelect = document.getElementById('gamePlatform');
    const yearInput = document.getElementById('gameYear');
    const timeInput = document.getElementById('gameTime');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const previewImage = document.getElementById('previewImage');
    const placeholderText = document.getElementById('placeholderText');
    const removeImageBtn = document.getElementById('removeImage');

    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importInput = document.getElementById('importInput');
    const clearBtn = document.getElementById('clearBtn');
    const sortSelect = document.getElementById('sortSelect');
    const gamesCount = document.getElementById('gamesCount');

    // --- Фильтры ---
    let currentFilter = 'all';
    const filterBtns = document.querySelectorAll('.filter-btn');
    const countElements = {
      all: document.getElementById('countAll'),
      PC: document.getElementById('countPC'),
      XBOX: document.getElementById('countXBOX'),
      PS: document.getElementById('countPS'),
      Nintendo: document.getElementById('countNintendo')
    };

    const modal = document.getElementById('editModal');
    const modalName = document.getElementById('modalGameName');
    const modalDescription = document.getElementById('modalGameDescription');
    const modalRating = document.getElementById('modalGameRating');
    const modalPlatform = document.getElementById('modalGamePlatform');
    const modalYear = document.getElementById('modalGameYear');
    const modalTime = document.getElementById('modalGameTime');
    const modalPreview = document.getElementById('modalPreview');
    const modalPlaceholder = document.getElementById('modalPlaceholder');
    const modalRemoveImage = document.getElementById('modalRemoveImage');
    const modalDropZone = document.getElementById('modalDropZone');
    const modalFileInput = document.getElementById('modalFileInput');
    const modalSaveBtn = document.getElementById('modalSaveBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');

    // --- Функция сжатия картинки ---
    function compressImage(dataUrl, maxWidth = 300, maxHeight = 200, quality = 0.7) {
      return new Promise((resolve) => {
        if (!dataUrl || !dataUrl.startsWith('data:image')) {
          resolve(dataUrl);
          return;
        }
        
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          
          // Масштабируем
          if (width > maxWidth) {
            height = height * (maxWidth / width);
            width = maxWidth;
          }
          if (height > maxHeight) {
            width = width * (maxHeight / height);
            height = maxHeight;
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = function() {
          resolve(dataUrl);
        };
        img.src = dataUrl;
      });
    }

    // --- Функция для парсинга времени ---
    function parseTimeString(timeStr) {
      if (!timeStr || timeStr.trim() === '') return 0;

      const str = timeStr.toLowerCase().trim();

      const hoursMatch = str.match(/(\d+\.?\d*)\s*(?:ч|час|часа|часов|h|hr)/i);
      const minutesMatch = str.match(/(\d+)\s*(?:м|мин|минуты|минут|min)/i);

      let hours = 0;
      let minutes = 0;

      if (hoursMatch) {
        hours = parseFloat(hoursMatch[1]);
      }
      if (minutesMatch) {
        minutes = parseInt(minutesMatch[1]) / 60;
      }

      if (!hoursMatch && !minutesMatch) {
        const num = parseFloat(str);
        if (!isNaN(num)) return num;
      }

      return hours + minutes;
    }

    // --- Toggle формы ---
    function toggleForm(show) {
      if (show === undefined) {
        addForm.classList.toggle('hidden');
      } else if (show) {
        addForm.classList.remove('hidden');
      } else {
        addForm.classList.add('hidden');
      }
      if (addForm.classList.contains('hidden')) {
        toggleFormBtn.innerHTML = '<i class="fas fa-plus-circle"></i> <span class="btn-label">Добавить игру</span>';
      } else {
        toggleFormBtn.innerHTML = '<i class="fas fa-times"></i> <span class="btn-label">Закрыть форму</span>';
        nameInput.focus();
      }
    }

    toggleFormBtn.addEventListener('click', () => toggleForm());
    cancelFormBtn.addEventListener('click', () => {
      toggleForm(false);
      nameInput.value = '';
      descriptionInput.value = '';
      yearInput.value = '';
      timeInput.value = '';
      setImageData(null);
      ratingSelect.value = '⭐⭐⭐';
      platformSelect.value = 'PC';
    });

    // --- Функция для генерации звёзд ---
    function getRatingStars(count) {
      const maxStars = 5;
      let html = '';
      for (let i = 0; i < maxStars; i++) {
        if (i < count) {
          html += '<i class="fas fa-star" style="color: #4f7df3; font-size: 0.95rem;"></i>';
        } else {
          html += '<i class="far fa-star" style="color: #dbe1ec; font-size: 0.95rem;"></i>';
        }
      }
      return html;
    }

    function saveGames() {
      try {
        const data = JSON.stringify(games);
        // Проверяем размер данных
        if (data.length > 4.5 * 1024 * 1024) {
          console.warn('⚠️ Данные близки к лимиту localStorage (~4.5 МБ). Рекомендуется удалить старые игры или сжать картинки.');
        }
        localStorage.setItem(STORAGE_KEY, data);
        return true;
      } catch (e) {
        if (e.name === 'QuotaExceededError') {
          alert('⚠️ Достигнут лимит хранилища! Попробуйте удалить старые игры или использовать картинки меньшего размера.');
        } else {
          console.warn('Не удалось сохранить игры:', e);
        }
        return false;
      }
    }

    function loadGames() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length > 0) {
            games = parsed;
            renderGames();
            return true;
          }
        }
      } catch (e) {
        console.warn('Ошибка загрузки из localStorage:', e);
        localStorage.removeItem(STORAGE_KEY);
        alert('⚠️ Данные были повреждены. Создан новый список.');
      }
      return false;
    }

    function getFilteredGames() {
      if (currentFilter === 'all') return games;
      return games.filter(g => g.platform === currentFilter);
    }

    function getSortedGames() {
      const sortType = sortSelect.value;
      const filtered = getFilteredGames();
      const copy = [...filtered];

      switch (sortType) {
        case 'newest':
          return copy.sort((a, b) => new Date(b.added) - new Date(a.added));
        case 'oldest':
          return copy.sort((a, b) => new Date(a.added) - new Date(b.added));
        case 'year-desc':
          return copy.sort((a, b) => {
            const ya = a.year ? parseInt(a.year) : 0;
            const yb = b.year ? parseInt(b.year) : 0;
            return yb - ya;
          });
        case 'year-asc':
          return copy.sort((a, b) => {
            const ya = a.year ? parseInt(a.year) : 0;
            const yb = b.year ? parseInt(b.year) : 0;
            return ya - yb;
          });
        case 'time-desc':
          return copy.sort((a, b) => {
            const ta = parseTimeString(a.time);
            const tb = parseTimeString(b.time);
            return tb - ta;
          });
        case 'time-asc':
          return copy.sort((a, b) => {
            const ta = parseTimeString(a.time);
            const tb = parseTimeString(b.time);
            return ta - tb;
          });
        case 'rating-desc':
          return copy.sort((a, b) => {
            const ra = a.rating ? a.rating.length : 0;
            const rb = b.rating ? b.rating.length : 0;
            return rb - ra;
          });
        case 'rating-asc':
          return copy.sort((a, b) => {
            const ra = a.rating ? a.rating.length : 0;
            const rb = b.rating ? b.rating.length : 0;
            return ra - rb;
          });
        case 'name-asc':
          return copy.sort((a, b) => a.name.localeCompare(b.name));
        case 'name-desc':
          return copy.sort((a, b) => b.name.localeCompare(a.name));
        default:
          return copy.reverse();
      }
    }

    // --- Обновление счётчиков фильтров ---
    function updateFilterCounts() {
      const platforms = ['all', 'PC', 'XBOX', 'PS', 'Nintendo'];
      platforms.forEach(p => {
        const count = p === 'all' ? games.length : games.filter(g => g.platform === p).length;
        if (countElements[p]) {
          countElements[p].textContent = count;
        }
      });
    }

    function setFilter(platform) {
      currentFilter = platform;
      filterBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.platform === platform);
      });
      renderGames();
    }

    // --- Фильтры ---
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        setFilter(btn.dataset.platform);
      });
    });

    // --- Работа с картинкой ---
    function setImageData(dataUrl) {
      if (dataUrl) {
        currentImageData = dataUrl;
        previewImage.src = dataUrl;
        previewImage.style.display = 'block';
        placeholderText.style.display = 'none';
        removeImageBtn.style.display = 'block';
      } else {
        currentImageData = null;
        previewImage.style.display = 'none';
        previewImage.src = '';
        placeholderText.style.display = 'flex';
        removeImageBtn.style.display = 'none';
      }
    }

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (e) => setImageData(e.target.result);
      reader.readAsDataURL(file);
    }

    function setModalImageData(dataUrl) {
      if (dataUrl) {
        modalImageData = dataUrl;
        modalPreview.src = dataUrl;
        modalPreview.style.display = 'block';
        modalPlaceholder.style.display = 'none';
        modalRemoveImage.style.display = 'block';
      } else {
        modalImageData = null;
        modalPreview.style.display = 'none';
        modalPreview.src = '';
        modalPlaceholder.style.display = 'flex';
        modalRemoveImage.style.display = 'none';
      }
    }

    function handleModalFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (e) => setModalImageData(e.target.result);
      reader.readAsDataURL(file);
    }

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
      fileInput.value = '';
    });

    document.addEventListener('paste', (e) => {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (let item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          handleFile(file);
          e.preventDefault();
          break;
        }
      }
    });

    removeImageBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      setImageData(null);
    });

    modalDropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      modalDropZone.classList.add('dragover');
    });
    modalDropZone.addEventListener('dragleave', () => {
      modalDropZone.classList.remove('dragover');
    });
    modalDropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      modalDropZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) handleModalFile(files[0]);
    });

    modalDropZone.addEventListener('click', () => modalFileInput.click());
    modalFileInput.addEventListener('change', () => {
      if (modalFileInput.files.length > 0) handleModalFile(modalFileInput.files[0]);
      modalFileInput.value = '';
    });

    document.addEventListener('paste', (e) => {
      if (!modal.classList.contains('active')) return;
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (let item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          handleModalFile(file);
          e.preventDefault();
          break;
        }
      }
    });

    modalRemoveImage.addEventListener('click', (e) => {
      e.stopPropagation();
      setModalImageData(null);
    });

    function getPlatformIcon(platform) {
      const map = {
        'PC': 'fa-solid fa-desktop',
        'XBOX': 'fa-brands fa-xbox',
        'PS': 'fa-brands fa-playstation',
        'Nintendo': 'fa-solid fa-gamepad'
      };
      return map[platform] || 'fa-solid fa-gamepad';
    }

    function renderGames() {
      const items = container.querySelectorAll('.game-item');
      items.forEach(el => el.remove());

      updateFilterCounts();

      const filtered = getFilteredGames();

      if (filtered.length === 0) {
        emptyState.style.display = 'flex';
        if (games.length === 0) {
          emptyState.innerHTML = '<i class="fas fa-ghost"></i><span>Пока ни одной игры. Нажмите «Добавить игру» чтобы начать!</span>';
        } else {
          emptyState.innerHTML = '<i class="fas fa-search"></i><span>Нет игр на выбранной платформе</span>';
        }
        gamesCount.textContent = `${filtered.length} из ${games.length} игр`;
        return;
      }
      emptyState.style.display = 'none';

      const count = filtered.length;
      const total = games.length;
      let word = 'игр';
      if (count === 1) word = 'игра';
      else if (count >= 2 && count <= 4) word = 'игры';
      gamesCount.textContent = total === count ? `${count} ${word}` : `${count} из ${total} игр`;

      const sorted = getSortedGames();

      sorted.forEach((game) => {
        const item = document.createElement('div');
        item.className = 'game-item';

        const coverDiv = document.createElement('div');
        coverDiv.className = 'game-cover';
        if (game.image && game.image.startsWith('data:image')) {
          const img = document.createElement('img');
          img.src = game.image;
          img.alt = game.name || 'Обложка';
          coverDiv.appendChild(img);
        } else {
          const icon = document.createElement('i');
          icon.className = 'fas fa-gamepad';
          coverDiv.appendChild(icon);
        }
        item.appendChild(coverDiv);

        const infoDiv = document.createElement('div');
        infoDiv.className = 'game-info';

        const titleSpan = document.createElement('div');
        titleSpan.className = 'game-title';
        titleSpan.textContent = game.name || 'Без названия';
        infoDiv.appendChild(titleSpan);

        if (game.description && game.description.trim() !== '') {
          const descSpan = document.createElement('div');
          descSpan.className = 'game-description';
          descSpan.textContent = game.description;
          infoDiv.appendChild(descSpan);
        }

        const timeSpan = document.createElement('div');
        timeSpan.className = 'game-time';
        const timeValue = game.time && game.time.trim() !== '' ? game.time : 'неизвестно';
        timeSpan.innerHTML = `<i class="fas fa-clock"></i> Время в игре: ${timeValue}`;
        infoDiv.appendChild(timeSpan);

        const metaDiv = document.createElement('div');
        metaDiv.className = 'game-meta';

        const ratingSpan = document.createElement('span');
        ratingSpan.className = 'game-rating';
        const ratingCount = game.rating ? game.rating.length : 3;
        ratingSpan.innerHTML = getRatingStars(ratingCount);
        metaDiv.appendChild(ratingSpan);

        const platformSpan = document.createElement('span');
        platformSpan.className = 'game-platform';
        const platformIcon = document.createElement('i');
        platformIcon.className = getPlatformIcon(game.platform);
        platformSpan.appendChild(platformIcon);
        platformSpan.appendChild(document.createTextNode(' ' + (game.platform || 'PC')));
        metaDiv.appendChild(platformSpan);

        if (game.year) {
          const yearSpan = document.createElement('span');
          yearSpan.className = 'game-year';
          yearSpan.innerHTML = `<i class="far fa-calendar-alt"></i> ${game.year}`;
          metaDiv.appendChild(yearSpan);
        }

        infoDiv.appendChild(metaDiv);
        item.appendChild(infoDiv);

        const actionDiv = document.createElement('div');
        actionDiv.className = 'action-btns';

        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.innerHTML = '<i class="fas fa-pen"></i>';
        editBtn.title = 'Редактировать';
        editBtn.addEventListener('click', () => openEditModal(game.id));
        actionDiv.appendChild(editBtn);

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
        deleteBtn.title = 'Удалить';
        deleteBtn.dataset.gameId = game.id;
        deleteBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = Number(this.dataset.gameId);
          const idx = games.findIndex(g => g.id === id);
          if (idx !== -1) {
            if (confirm(`Удалить игру "${games[idx].name}"?`)) {
              games.splice(idx, 1);
              saveGames();
              renderGames();
            }
          }
        });
        actionDiv.appendChild(deleteBtn);

        item.appendChild(actionDiv);
        container.appendChild(item);
      });
    }

    function openEditModal(gameId) {
      const game = games.find(g => g.id === gameId);
      if (!game) return;

      editingGameId = gameId;
      modalName.value = game.name || '';
      modalDescription.value = game.description || '';
      modalRating.value = game.rating || '⭐⭐⭐';
      modalPlatform.value = game.platform || 'PC';
      modalYear.value = game.year || '';
      modalTime.value = game.time || '';

      if (game.image && game.image.startsWith('data:image')) {
        setModalImageData(game.image);
      } else {
        setModalImageData(null);
      }

      modal.classList.add('active');
      modalName.focus();
    }

    function closeEditModal() {
      modal.classList.remove('active');
      editingGameId = null;
      setModalImageData(null);
    }

    function saveEditModal() {
      const name = modalName.value.trim();
      if (!name) {
        alert('Пожалуйста, введите название игры.');
        return;
      }

      const idx = games.findIndex(g => g.id === editingGameId);
      if (idx === -1) return;

      games[idx].name = name;
      games[idx].description = modalDescription.value.trim();
      games[idx].rating = modalRating.value;
      games[idx].platform = modalPlatform.value;
      games[idx].year = modalYear.value.trim() || '';
      games[idx].time = modalTime.value.trim() || '';
      if (modalImageData !== null) {
        games[idx].image = modalImageData;
      }

      saveGames();
      renderGames();
      closeEditModal();
    }

    // --- Добавление игры с сжатием ---
    async function addGame() {
      const name = nameInput.value.trim();
      if (!name) {
        alert('Пожалуйста, введите название игры.');
        return;
      }

      const description = descriptionInput.value.trim();
      const year = yearInput.value.trim();
      const time = timeInput.value.trim();

      let imageData = currentImageData || '';
      
      // Сжимаем картинку, если она есть
      if (imageData && imageData.startsWith('data:image')) {
        try {
          imageData = await compressImage(imageData, 300, 200, 0.7);
        } catch (e) {
          console.warn('Не удалось сжать картинку:', e);
        }
      }

      const newGame = {
        id: Date.now(),
        image: imageData,
        name: name,
        description: description,
        rating: ratingSelect.value,
        platform: platformSelect.value,
        year: year,
        time: time,
        added: new Date().toISOString()
      };

      games.push(newGame);
      const saved = saveGames();
      renderGames();

      if (saved) {
        nameInput.value = '';
        descriptionInput.value = '';
        yearInput.value = '';
        timeInput.value = '';
        setImageData(null);
        ratingSelect.value = '⭐⭐⭐';
        platformSelect.value = 'PC';
        nameInput.focus();
        toggleForm(false);
      } else {
        // Если не сохранилось — удаляем игру из массива
        games.pop();
        renderGames();
        alert('❌ Не удалось сохранить игру. Возможно, превышен лимит хранилища. Попробуйте использовать картинки меньшего размера.');
      }
    }

    // --- Экспорт в PDF через печать ---
    function exportToPDF() {
      if (games.length === 0) {
        alert('Список игр пуст! Нечего экспортировать.');
        return;
      }

      // Сохраняем текущий заголовок страницы
      const originalTitle = document.title;
      document.title = 'Мои пройденные игры';

      // Добавляем класс для печати
      document.body.classList.add('printing');

      // Показываем индикатор загрузки
      const loading = document.createElement('div');
      loading.style.cssText = `
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(255,255,255,0.9); z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; color: #4f7df3; flex-direction: column; gap: 16px;
      `;
      loading.innerHTML = `
        <div style="font-size: 40px;">🖨️</div>
        <div>Подготовка PDF...</div>
        <div style="font-size: 14px; color: #a5b6cd;">Откроется окно печати. Выберите «Сохранить как PDF».</div>
      `;
      document.body.appendChild(loading);

      // Небольшая задержка для отображения индикатора
      setTimeout(() => {
        // Удаляем индикатор
        document.body.removeChild(loading);

        // Открываем диалог печати
        window.print();

        // Восстанавливаем заголовок
        setTimeout(() => {
          document.title = originalTitle;
          document.body.classList.remove('printing');
        }, 500);
      }, 500);
    }

    // --- Экспорт ---
    function exportGames() {
      if (games.length === 0) {
        alert('Список игр пуст. Нечего экспортировать.');
        return;
      }
      const data = JSON.stringify(games, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const date = new Date().toISOString().slice(0, 10);
      a.download = `games_backup_${date}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // --- Импорт ---
    function importGames(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!Array.isArray(imported)) {
            throw new Error('Неверный формат: ожидается массив');
          }
          if (imported.length === 0) {
            alert('Файл пуст. Ничего не импортировано.');
            return;
          }
          const valid = imported.every(g => g.id && g.name);
          if (!valid) {
            throw new Error('Некорректные данные: у каждой игры должны быть id и name');
          }
          if (games.length > 0) {
            const confirm = window.confirm(
              `Текущий список содержит ${games.length} игр.\nИмпорт ЗАМЕНИТ все текущие данные.\nПродолжить?`
            );
            if (!confirm) return;
          }
          games = imported;
          saveGames();
          renderGames();
          alert(`✅ Импортировано ${games.length} игр!`);
        } catch (err) {
          alert('❌ Ошибка импорта: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // --- Очистка ---
    function clearAll() {
      if (games.length === 0) {
        alert('Список уже пуст.');
        return;
      }
      const confirm = window.confirm(
        `⚠️ Вы уверены, что хотите удалить ВСЕ ${games.length} игр?\nЭто действие нельзя отменить!`
      );
      if (!confirm) return;
      games = [];
      saveGames();
      renderGames();
      alert('🗑️ Все игры удалены.');
    }

    function seedDemoGames() {
      games = [
        {
          id: 1001,
          image: 'https://upload.wikimedia.org/wikipedia/en/4/46/The_Last_of_Us_Part_II_cover.jpg',
          name: 'The Last of Us Part II',
          description: 'Эмоциональное завершение истории Элли и Эбби. Борьба за выживание, прощение и искупление.',
          rating: '⭐⭐⭐⭐⭐',
          platform: 'PS',
          year: '2020',
          time: '25 часов',
          added: new Date().toISOString()
        },
        {
          id: 1002,
          image: '',
          name: 'Disco Elysium',
          description: 'Детективная RPG с уникальной механикой диалогов и внутренних голосов.',
          rating: '⭐⭐⭐⭐',
          platform: 'PC',
          year: '2019',
          time: '30 часов',
          added: new Date().toISOString()
        },
        {
          id: 1003,
          image: '',
          name: 'Hades',
          description: 'Быстрая и динамичная roguelike-игра про побег из подземного мира.',
          rating: '⭐⭐⭐⭐⭐',
          platform: 'Nintendo',
          year: '2021',
          time: '15 часов 30 минут',
          added: new Date().toISOString()
        }
      ];
      saveGames();
      renderGames();
    }

    function init() {
      const hasSaved = loadGames();
      if (!hasSaved) {
        seedDemoGames();
      }
      updateFilterCounts();
    }

    // --- События ---
    addBtn.addEventListener('click', addGame);
    document.querySelectorAll('.field input, .field select, .field textarea').forEach(el => {
      el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && this.tagName !== 'TEXTAREA') {
          e.preventDefault();
          addGame();
        }
      });
    });

    sortSelect.addEventListener('change', renderGames);

    exportPdfBtn.addEventListener('click', exportToPDF);
    exportBtn.addEventListener('click', exportGames);
    importInput.addEventListener('change', (e) => {
      if (importInput.files.length > 0) {
        importGames(importInput.files[0]);
        importInput.value = '';
      }
    });
    clearBtn.addEventListener('click', clearAll);

    modalCancelBtn.addEventListener('click', closeEditModal);
    modalSaveBtn.addEventListener('click', saveEditModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeEditModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        closeEditModal();
      }
      if (e.key === 'Escape' && !addForm.classList.contains('hidden')) {
        toggleForm(false);
      }
    });

    init();
  })();
</script>
